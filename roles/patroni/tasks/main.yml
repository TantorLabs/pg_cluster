block:
  - name: Configure patroni apt repository key
    apt_key:
      url: "{{ patroni_apt_key_url }}"
  - name: Configure patroni apt repository
    apt_repository:
      repo: "{{ patroni_apt_repo }}"
  when: ansible_pkg_mgr == "apt"

block:
  - name: Add Tantor rpm repository
    ansible.builtin.yum_repository:
      name: tantor
      description: Tantor RPM repo
      file: external_repos
      baseurl: https://download.postgresql.org/pub/repos/yum/reporpms/EL-7-x86_64/pgdg-redhat-repo-latest.noarch.rpm
      gpgcheck: no
  when: ansible_pkg_mgr == "yum"

- name: Add patroni group
  group:
    name: "{{ patroni_system_group }}"
    state: present

- name: Add patroni user
  user:
    name: "{{ patroni_system_user }}"
    group: "{{ patroni_system_group }}"
    system: yes

- name: Create udev rule for watchdog
  copy:
    content: 'KERNEL=="{{ patroni_watchdog_device |basename }}", OWNER="{{ patroni_system_user }}", GROUP="{{ patroni_system_group }}", MODE="0600"'
    dest: /etc/udev/rules.d/60-watchdog.rules
    owner: root
    group: root
    mode: 0644

- block:
  - name: Install watchdog on Astra Linux
    package:
      name: freeipmi-bmc-watchdog
      update_cache: yes
  when: ansible_os_family == "Astra Linux"

- name: Install watchdog
  package:
    name: watchdog
    update_cache: yes

- name: Make kernel watchdog device available for patroni
  template:
    src: patroni-watchdog.service.j2
    dest: /etc/systemd/system/patroni-watchdog.service
    owner: root
    group: root
    mode: 0644
  notify:
    - restart patroni-watchdog

# Dirty hack. See https://bugs.launchpad.net/ubuntu/+source/watchdog/+bug/1448924
- name: Enable watchdog daemon to start on boot
  file:
    src: /lib/systemd/system/watchdog.service
    dest: /etc/systemd/system/multi-user.target.wants/watchdog.service
    state: link
  when: ansible_distribution in ('Ubuntu', 'Debian') and
        ansible_distribution_release in ('xenial', 'jessie')

- name: Force systemd to reread configs
  ansible.builtin.systemd:
    daemon_reload: true

- name: Install system packages for patroni
  package:
    name: patroni
    state: latest
    update_cache: yes

- name: Create patroni config directory
  file:
    path: "{{ patroni_config_dir }}"
    state: directory
    owner: "{{ patroni_system_user }}"
    group: "{{ patroni_system_group }}"
    mode: 0750

- name: Create patroni log directory
  file:
    path: "{{ patroni_log_dir }}"
    state: directory
    owner: "{{ patroni_system_user }}"
    group: "{{ patroni_system_group }}"
    mode: 0750
  when: patroni_log_destination |d('stderr', true) != 'stderr'

  - name: Create /var/run/postgresql directory
  file:
    path: "/var/run/postgresql"
    state: directory
    owner: "{{ patroni_system_user }}"
    group: "{{ patroni_system_group }}"
    mode: 2755


- name: Prepare callback scripts
  copy:
    src: "callbacks/{{ item.event }}"
    dest: "{{ item.script }}"
    owner: "{{ patroni_system_user }}"
    group: "{{ patroni_system_group }}"
    mode: 0750
    backup: yes
  with_items:
    - "{{ patroni_pg_callbacks }}"
  when: not( (item.script is none) or (item.script | trim | length == 0) )

- name: Allow patroni_pg_port	# TODO from specific IPs
  community.general.ufw:
    port: '{{ patroni_pg_port }}'
    rule: allow
    delete: yes
    proto: tcp

- name: Create patroni unit file
  template:
    src: patroni.service.j2
    dest: /etc/systemd/system/patroni.service
    owner: root
    group: root
    mode: 0644

- name: Create patroni configuration file
  template:
    src: patroni.yml.j2
    dest: "{{ patroni_config_dir }}/{{ patroni_name|default(inventory_hostname) }}.yml"
    owner: "{{ patroni_system_user }}"
    group: "{{ patroni_system_group }}"
    mode: 0600
  notify:
    - restart patroni

- name: Copy keys/certs from etcd
  become: yes
  become_user: root
  with_items:
    - f: '{{ etcd_pki_key_src }}'
      d: /etc/patroni
      m: '0400'
    - f: '{{ etcd_pki_cert_src }}'
      d: /etc/patroni
      m: '0600'
    - f: '{{ etcd_pki_ca_cert_src }}'
      d: /etc/patroni
      m: '0600'
  copy:
    src: '{{ item.f }}'
    dest: '{{ item.d }}'
    owner: postgres
    group: postgres
    mode: '{{ item.m }}'

- name: Check patroni
  shell: systemctl status patroni.service | grep Active | awk -v N=2 '{print $N}'
  register: patroni_output

- name: Stop patroni if active
  service:
    name: patroni.service
    state: stopped
  path: '{{ patroni_pg_socket_file }}'

- name: Ensure patroni is running
  systemd:
    name: patroni.service
    state: started
    daemon_reload: yes
    enabled: yes
  tags: [patroni]

- wait_for:
    path: /var/run/postgresql/.s.PGSQL.{{ patroni_pg_port }}

- name: Create replication user
  become: yes
  become_user: root
  command: su - postgres -c "psql -A -t -d postgres -c \"CREATE ROLE {{ patroni_replication_username }} WITH REPLICATION LOGIN PASSWORD '{{ patroni_replication_password }}'\""
  ignore_errors: yes

- name: Update replication user password
  become: yes
  become_user: root
  command: su - postgres -c "psql -A -t -d postgres -c \"ALTER USER {{ patroni_replication_username }} WITH REPLICATION LOGIN PASSWORD '{{ patroni_replication_password }}'\""
  ignore_errors: yes

